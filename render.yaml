services:
  - type: web
    name: ai-attendance-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.9"
    buildCommand: apt-get update && apt-get install -y cmake build-essential libopenblas-dev liblapack-dev libx11-dev libgtk-3-dev && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: GEMINI_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: uploads
